# .github/workflows/deploy-pages.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deploy-time config
        run: |
          mkdir -p js
          cat > js/config.js <<EOF
          window.POKER_TRACKER_CONFIG = {
            supabaseUrl: "${{ vars.SUPABASE_URL }}",
            supabaseAnonKey: "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"
          };
          EOF

      - name: Verify files
        run: ls -R

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4